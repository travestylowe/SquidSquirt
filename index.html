<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Squirt</title>
  <meta name="description" content="Press the squid. You know you want to.">

  <!-- Open Graph -->
  <meta property="og:title" content="Squid Squirt">
  <meta property="og:description" content="Press the squid. You know you want to.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://squidsquirts.com">
  <!-- og:image: add a screenshot here when you have one -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="ink-canvas"></canvas>

  <div id="app">
    <div id="counter-section">
      <div id="counter-label">total squirts</div>
      <div id="counter">0</div>
    </div>
  </div>

  <div id="squid-wrap">
    <button id="squid-btn" aria-label="Squirt the squid">
      <svg id="squid-svg" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg" style="overflow: visible">
        <defs>
          <radialGradient id="bodyGrad" cx="38%" cy="30%" r="65%">
            <stop offset="0%"   stop-color="#c084fc"/>
            <stop offset="55%"  stop-color="#9333ea"/>
            <stop offset="100%" stop-color="#581c87"/>
          </radialGradient>
          <radialGradient id="eyeGrad" cx="30%" cy="28%" r="70%">
            <stop offset="0%"   stop-color="#faf5ff"/>
            <stop offset="100%" stop-color="#e9d5ff"/>
          </radialGradient>
          <radialGradient id="finGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%"   stop-color="#7e22ce"/>
            <stop offset="100%" stop-color="#4c1d95"/>
          </radialGradient>
          <radialGradient id="wizardGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <g id="squid-drift-layer">
        <g id="squid-body">

          <!-- Mantle -->
          <path d="M200 18C246 18 274 56 274 113C274 164 249 190 200 190C151 190 126 164 126 113C126 56 154 18 200 18Z"
                fill="url(#bodyGrad)"/>

          <!-- Side fins -->
          <path d="M126 84C98 69 86 110 113 137C122 146 126 138 126 138Z" fill="url(#finGrad)"/>
          <path d="M274 84C302 69 314 110 287 137C278 146 274 138 274 138Z" fill="url(#finGrad)"/>

          <!-- Mantle sheen -->
          <ellipse cx="176" cy="62" rx="20" ry="30"
                   fill="rgba(255,255,255,0.07)" transform="rotate(-10 176 62)"/>

          <!-- Left eye -->
          <circle cx="172" cy="116" r="28" fill="url(#eyeGrad)"/>
          <circle class="squid-eye-outline" cx="172" cy="116" r="28" fill="none" stroke="#7e22ce" stroke-width="1.5"/>
          <circle id="pupil-left"  cx="174" cy="118" r="17" fill="#160030"/>
          <circle cx="164" cy="108" r="5.5" fill="white" opacity="0.85"/>
          <circle cx="160" cy="104" r="2.5" fill="white" opacity="0.5"/>

          <!-- Right eye -->
          <circle cx="228" cy="116" r="28" fill="url(#eyeGrad)"/>
          <circle class="squid-eye-outline" cx="228" cy="116" r="28" fill="none" stroke="#7e22ce" stroke-width="1.5"/>
          <circle id="pupil-right" cx="230" cy="118" r="17" fill="#160030"/>
          <circle cx="220" cy="108" r="5.5" fill="white" opacity="0.85"/>
          <circle cx="216" cy="104" r="2.5" fill="white" opacity="0.5"/>

          <!-- Blush cheeks (hidden by default, shown via JS) -->
          <ellipse id="blush-left"  cx="153" cy="141" rx="22" ry="11" fill="#f472b6" opacity="0"/>
          <ellipse id="blush-right" cx="247" cy="141" rx="22" ry="11" fill="#f472b6" opacity="0"/>

          <!-- Collar -->
          <ellipse id="squid-collar" cx="200" cy="193" rx="61" ry="14" fill="#6b21a8"/>

          <!-- Arms (8) -->
          <g id="squid-arms" stroke="#7e22ce" stroke-width="8" stroke-linecap="round" fill="none">
            <path d="M158 198Q142 240 136 280"/>
            <path d="M172 203Q160 246 158 285"/>
            <path d="M186 206Q178 250 178 290"/>
            <path d="M200 207Q198 252 199 292"/>
            <path d="M214 206Q220 250 222 290"/>
            <path d="M228 203Q238 246 242 285"/>
            <path d="M242 198Q258 240 264 280"/>
          </g>

          <!-- Long feeding tentacles -->
          <g id="squid-feeders" stroke="#5b1a8a" stroke-width="6" stroke-linecap="round" fill="none">
            <path d="M176 203Q150 264 132 314Q124 338 137 344Q151 348 153 330Q156 317 165 306"/>
            <path d="M224 203Q250 264 268 314Q276 338 263 344Q249 348 247 330Q244 317 235 306"/>
          </g>

          <!-- Tentacle clubs -->
          <ellipse class="squid-club" cx="141" cy="343" rx="15" ry="8" fill="#4c1d95" transform="rotate(-20 141 343)"/>
          <ellipse class="squid-club" cx="259" cy="343" rx="15" ry="8" fill="#4c1d95" transform="rotate(20 259 343)"/>
          <g id="squid-club-dots" fill="#3b1178">
            <circle cx="136" cy="340" r="2.5"/>
            <circle cx="142" cy="337" r="2.5"/>
            <circle cx="148" cy="341" r="2.5"/>
            <circle cx="254" cy="340" r="2.5"/>
            <circle cx="260" cy="337" r="2.5"/>
            <circle cx="266" cy="341" r="2.5"/>
          </g>

          <!-- Ink siphon -->
          <path id="squid-siphon" d="M192 184C188 200 188 218 200 222C212 218 212 200 208 184Z" fill="#4a1278"/>
          <ellipse id="squid-siphon-mouth" cx="200" cy="223" rx="10" ry="5" fill="#3b0f66"/>

        </g>
        </g>
      </svg>
    </button>

    <div id="hint" aria-live="polite">▾ squeeze me ▾</div>
  </div>

  <!-- Floating control buttons -->
  <div id="controls" aria-label="Game controls">
    <button id="mute-btn" aria-label="Toggle sound" title="Toggle sound">
      <svg class="ctrl-icon" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 2L5 7H2v6h3l5 5V2z" fill="currentColor"/>
        <path class="sound-wave" d="M13.5 5.5c1.6 1.3 2.5 3 2.5 4.5s-.9 3.2-2.5 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="share-btn" aria-label="Share your score" title="Share">
      <svg class="ctrl-icon" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 2l4 4h-3v6H9V6H6l4-4z" fill="currentColor"/>
        <path d="M4 12v4h12v-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="accessory-btn" aria-label="Squid accessories" title="Accessories">
      <svg class="ctrl-icon" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 1l2.5 5.5L18 7.5l-4 4.5 1 6L10 15l-5 3 1-6-4-4.5 5.5-1z" fill="currentColor"/>
      </svg>
    </button>
    <button id="feedback-btn" aria-label="Send feedback" title="Feedback">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
  </div>

  <!-- Unlock picker panel (tabbed: Hats / Ink / Confetti) -->
  <div id="unlock-panel" class="side-panel">
    <div id="unlock-tabs">
      <button class="unlock-tab active" data-tab="hats">Hats</button>
      <button class="unlock-tab" data-tab="ink">Ink</button>
      <button class="unlock-tab" data-tab="confetti">Confetti</button>
    </div>
    <div id="unlock-tab-content"></div>
  </div>

  <!-- Payment modal overlay -->
  <div id="payment-modal" class="payment-modal" aria-modal="true" role="dialog" hidden>
    <div class="payment-modal-inner">
      <button id="payment-close" class="payment-close" aria-label="Close">&times;</button>
      <div id="payment-title" class="payment-title"></div>
      <div id="payment-body" class="payment-body"></div>
      <div id="payment-actions" class="payment-actions"></div>
    </div>
  </div>

  <!-- Feedback modal overlay -->
  <div id="feedback-modal" class="payment-modal" aria-modal="true" role="dialog" hidden>
    <div class="payment-modal-inner">
      <button id="feedback-close" class="payment-close" aria-label="Close">&times;</button>
      <div class="payment-title">Send Feedback</div>
      <div id="feedback-body" class="payment-body">
        <label for="feedback-type" class="feedback-label">What kind of feedback?</label>
        <select id="feedback-type" class="feedback-select">
          <option value="bug">Bug Report</option>
          <option value="feature">Feature Request</option>
          <option value="hello">Just Saying Hi</option>
        </select>
        <label for="feedback-text" class="feedback-label">Your message</label>
        <textarea id="feedback-text" class="feedback-textarea" placeholder="Tell the squid what's on your mind..." maxlength="280" rows="3"></textarea>
      </div>
      <div id="feedback-actions" class="payment-actions">
        <button id="feedback-submit" class="payment-submit-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <button id="leaderboard-btn" class="floating-leaderboard-btn" aria-label="Leaderboard" title="Leaderboard" hidden>
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 15l-2 5h4l-2-5z"/>
      <path d="M6 9h12l-1.5-5h-9L6 9z"/>
      <path d="M6 9c0 3.3 2.7 6 6 6s6-2.7 6-6"/>
    </svg>
  </button>

  <div id="leaderboard-panel" class="leaderboard-panel" hidden>
    <div class="leaderboard-inner">
      <button id="leaderboard-close" class="leaderboard-close-btn" aria-label="Close">&times;</button>
      <h2 class="leaderboard-title">Leaderboard</h2>
      <div id="leaderboard-name-row" class="leaderboard-name-row">
        <label for="leaderboard-name-input" class="feedback-label">Your name</label>
        <div class="leaderboard-name-input-row">
          <input id="leaderboard-name-input" type="text" maxlength="50" placeholder="Anonymous Squid" class="feedback-textarea" style="resize:none;height:auto;padding:6px 10px"/>
          <button id="leaderboard-name-save" class="recovery-btn">Save</button>
        </div>
      </div>
      <div id="leaderboard-list" class="leaderboard-list"></div>
      <div id="leaderboard-rank" class="leaderboard-rank"></div>
      <div class="recovery-section">
        <button id="recovery-toggle" class="recovery-toggle">Transfer Account</button>
        <div id="recovery-content" class="recovery-content" hidden>
          <div id="recovery-code-display" class="recovery-code-display"></div>
          <button id="recovery-show-btn" class="recovery-btn">Show My Code</button>
          <div class="recovery-divider">or recover on this device</div>
          <input id="recovery-input" type="text" class="feedback-textarea" style="resize:none;height:auto;padding:6px 10px" placeholder="Paste recovery code here" maxlength="60"/>
          <button id="recovery-apply-btn" class="recovery-btn" disabled>Recover</button>
          <div id="recovery-status" class="recovery-status"></div>
        </div>
      </div>
    </div>
  </div>

  <footer id="global-bar" aria-label="Global squirt total">
    <span id="global-counter-label">global squirts</span>
    <span id="global-counter">—</span>
  </footer>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
